services:
  db:
    image: postgres:13.4-alpine
    container_name: bbapp_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASS}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - ${DB_PORT}:5432
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    build: .
    container_name: bbapp_app
    command: uvicorn src.main:app --reload --host 0.0.0.0 --port 8000
    env_file:
      - .env
    volumes:
      - .:/app
    ports:
      - 8000:8000
    depends_on:
      - db

  ngrok:
    image: ngrok/ngrok:latest
    container_name: bbapp_ngrok
    depends_on:
      - app
    command: http app:8000
    environment:
      NGROK_AUTHTOKEN: ${NGROK_ATUH_TOKEN}
    ports:
      - 4040:4040

volumes:
  postgres_data:
